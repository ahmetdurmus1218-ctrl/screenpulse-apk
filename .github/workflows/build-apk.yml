name: Build Debug APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract project zip (if the project was uploaded as a .zip via GitHub's web UI)
        run: |
          ZIPFILE=$(find . -maxdepth 1 -iname "*.zip" | head -n1)
          if [ -n "$ZIPFILE" ]; then
            echo "Found $ZIPFILE, extracting..."
            unzip -o "$ZIPFILE" -d .
          else
            echo "No zip found at repo root, assuming project files were pushed directly."
          fi


      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.3.1

      - name: Create placeholder .env (Gemini key not used by this app)
        run: echo "GEMINI_API_KEY=unused" > .env

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace > build_log.txt 2>&1 || echo "BUILD_FAILED=1" >> $GITHUB_ENV

      - name: Commit build log and APK back to repo (for diagnostics/retrieval)
        if: always()
        run: |
          git config user.email "ci@screenpulse.local"
          git config user.name "ScreenPulse CI"
          git add build_log.txt
          mkdir -p dist
          if ls app/build/outputs/apk/debug/*.apk 1> /dev/null 2>&1; then
            cp app/build/outputs/apk/debug/*.apk dist/app-debug.apk
            git add dist/app-debug.apk
          fi
          git commit -m "CI build log + APK [skip ci]" || echo "Nothing new to commit"
          for i in 1 2 3 4 5; do
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, pulling and rebasing before retry..."
            git pull --rebase origin "${GITHUB_REF_NAME}" || true
            sleep 3
          done
          echo "::error::Failed to push CI build results after 5 attempts"
          exit 1

      - name: Fail job if build failed
        if: env.BUILD_FAILED == '1'
        run: exit 1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: screenpulse-debug-apk
          path: app/build/outputs/apk/debug/*.apk
